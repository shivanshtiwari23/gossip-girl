<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send a Tip | Gossip Girl</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="background"></div>

    <section class="generator">

        <div class="generator-box">

            <h2>Send a Tip</h2>

            <p class="tip-text">
                Got something juicy? Send Gossip Girl a tip.
            </p>

            <!-- IMAGE UPLOAD -->
            <input
                type="file"
                id="imageUpload"
                accept="image/*">

            <!-- HEADLINE -->
            <input
                type="text"
                id="headlineInput"
                placeholder="Spotted: Serena van der Woodsen">

            <!-- GOSSIP -->
            <textarea
                id="gossipInput"
                placeholder="What's the latest Upper East Side secret?"></textarea>

            <!-- GENERATE -->
            <button id="generateBtn">
                Generate Gossip Blast 💋
            </button>

        </div>

    </section>

    <!-- BACKGROUND MUSIC -->
    <audio id="bgMusic" loop>
        <source src="assets/audio/Gossip Girl Theme Song (Instrumental).mp3" type="audio/mpeg">
    </audio>

    <!-- MUTE BUTTON -->
    <button id="musicToggle" style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        background: transparent;
        border: 1px solid #ff7eb9;
        border-radius: 50%;
        width: 42px;
        height: 42px;
        cursor: pointer;
        font-size: 18px;
        color: #ff7eb9;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 10px rgba(255,126,185,0.4);
    ">🔊</button>

    <script src="js/main.js"></script>

    <script>
        const bgMusic     = document.getElementById("bgMusic");
        const musicToggle = document.getElementById("musicToggle");

        // remember user preference
        const savedMute = localStorage.getItem("musicMuted");
        if (savedMute === "true") {
            bgMusic.muted = true;
            musicToggle.textContent = "🔇";
        }

        // start on first click
        document.addEventListener("click", () => {
            if (bgMusic.paused) {
                bgMusic.volume = 0.15;
                bgMusic.play();
            }
        }, { once: true });

        // toggle mute and save preference
        musicToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            bgMusic.muted = !bgMusic.muted;
            musicToggle.textContent = bgMusic.muted ? "🔇" : "🔊";
            localStorage.setItem("musicMuted", bgMusic.muted);
        });
    </script>

</body>
</html>
