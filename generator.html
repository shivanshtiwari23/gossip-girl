<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Send a Tip | Gossip Girl</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="background"></div>

    <section class="generator">

        <div class="generator-box">

            <h2>Send a Tip</h2>

            <p class="tip-text">
                Got something juicy? Send Gossip Girl a tip.
            </p>

            <!-- IMAGE UPLOAD -->
            <input
                type="file"
                id="imageUpload"
                accept="image/*">

            <!-- HEADLINE -->
            <input
                type="text"
                id="headlineInput"
                placeholder="Spotted: Serena van der Woodsen">

            <!-- GOSSIP -->
            <textarea
                id="gossipInput"
                placeholder="What's the latest Upper East Side secret?"></textarea>

            <!-- GENERATE -->
            <button id="generateBtn">
                Generate Gossip Blast 💋
            </button>

        </div>

    </section>

    <script src="js/main.js"></script>

</body>
</html>
